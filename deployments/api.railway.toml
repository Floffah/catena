[build]
builder = "DOCKERFILE"
dockerfilePath = "deployments/api.Dockerfile"
watchPatterns = ["cmd/**", "internal/**", "data/**", "api/**", "go.*", "pkg/**"]

[deploy]
healthcheckPath = "/v1/healthz"
healthcheckTimeout = 100
restartPolicyType = "ALWAYS"
preDeployCommand = "tern migrate --migrations /app/data/migrations"
