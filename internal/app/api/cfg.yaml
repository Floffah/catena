# yaml-language-server: $schema=https://raw.githubusercontent.com/oapi-codegen/oapi-codegen/HEAD/configuration-schema.json
package: api
output: api.gen.go
generate:
  gin-server: true
  models: true
  strict-server: true
output-options:
  response-type-suffix: ClientResponse
  skip-prune: true
  include-tags:
    - "v1"