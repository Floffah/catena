openapi: 3.0.3
info:
  title: Catena Public API
  version: 1.0.0
  description: |
    Public API for Catena services
    
    This is the API you should hit when interacting with Catena services. It is the same API that the Catena frontend uses.
    Do not use any other API.
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
  contact:
    name: Catena Support
    email: support@oncatena.com
  termsOfService: https://oncatena.com/terms
servers:
  - url: http://localhost:8080
    description: Local server
  - url: https://api.oncatena.com
    description: Production server
tags:
  - name: v1
    description: Version 1 of the API
paths:
  "/v1/healthz":
    get:
      tags:
        - v1
      summary: Health Check
      description: Check the health of the API service. Note that this will only ever return "ok".
      operationId: healthz
      security: [ ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
  "/v1/version":
    get:
      tags:
        - v1
      summary: Version
      description: Retrieve the deployed Catena version and build commit.
      operationId: version
      security: [ ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"
  "/v1/user":
    get:
      tags:
        - v1
      summary: Get Authenticated User
      description: Retrieve the authenticated Catena user, creating the local user record from Clerk if needed.
      operationId: getAuthenticatedUser
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      tags:
        - v1
      summary: Update Authenticated User
      description: Merge-update Catena-owned profile fields for the authenticated user.
      operationId: updateAuthenticatedUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAuthenticatedUserRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  "/v1/users/clerk/{clerkUserId}":
    get:
      tags:
        - v1
      summary: Get User By Clerk ID
      description: Retrieve the authenticated Catena user by Clerk user ID. The path Clerk user ID must match the authenticated Clerk principal.
      operationId: getUserByClerkUserId
      parameters:
        - name: clerkUserId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  "/v1/users/name/{name}":
    get:
      tags:
        - v1
      summary: Get User By Name
      description: Retrieve a public Catena user by username.
      operationId: getUserByName
      security: [ ]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  "/v1/auth/clerk/sign-in-token":
    post:
      tags:
        - v1
      summary: Create Clerk Sign-In Token
      description: Create a Clerk sign-in token for the authenticated user. This is intended for CLI login handoff flows.
      operationId: createClerkSignInToken
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClerkSignInTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  "/v1/git-access-tokens":
    get:
      tags:
        - v1
      summary: List Git Access Tokens
      description: List Git access tokens for the authenticated user.
      operationId: listGitAccessTokens
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GitAccessToken"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - v1
      summary: Create Git Access Token
      description: Create a Git access token for HTTP Git authentication. The raw token is returned once.
      operationId: createGitAccessToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGitAccessTokenRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGitAccessTokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  "/v1/git-access-tokens/{id}":
    delete:
      tags:
        - v1
      summary: Revoke Git Access Token
      description: Revoke a Git access token owned by the authenticated user.
      operationId: revokeGitAccessToken
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  "/v1/repositories":
    post:
      tags:
        - v1
      summary: Create Repository
      description: Create a repository owned by the authenticated user.
      operationId: createRepository
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRepositoryRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRepositoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  "/v1/repositories/{owner}/{repository}":
    get:
      tags:
        - v1
      summary: Get Repository
      description: Retrieve a repository by owner and name. Public repositories can be retrieved without authentication.
      operationId: getRepositoryByOwnerAndName
      security:
        - { }
        - bearerAuth: [ ]
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repository
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repository"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  "/v1/repositories/{owner}/{repository}/issues":
    get:
      tags:
        - v1
      summary: List Repository Issues
      description: List issues for a repository. Public repository issues can be listed without authentication.
      operationId: listRepositoryIssues
      security:
        - { }
        - bearerAuth: [ ]
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repository
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIssuesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - v1
      summary: Create Repository Issue
      description: Create an issue in a repository.
      operationId: createRepositoryIssue
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repository
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIssueRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  "/v1/repositories/{owner}/{repository}/issues/{number}":
    get:
      tags:
        - v1
      summary: Get Repository Issue
      description: Retrieve an issue by repository item number. Public repository issues can be retrieved without authentication.
      operationId: getRepositoryIssue
      security:
        - { }
        - bearerAuth: [ ]
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repository
          in: path
          required: true
          schema:
            type: string
        - name: number
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  "/v1/repositories/{owner}/{repository}/readme":
    get:
      tags:
        - v1
      summary: Get Repository README
      description: Retrieve the first supported README file in a repository directory. Public repositories can be retrieved without authentication.
      operationId: getRepositoryReadme
      security:
        - { }
        - bearerAuth: [ ]
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repository
          in: path
          required: true
          schema:
            type: string
        - name: ref
          in: query
          required: false
          description: Branch, tag, or commit to read from. Defaults to the repository default branch.
          schema:
            type: string
        - name: path
          in: query
          required: false
          description: Directory path to search for a README in. Defaults to the repository root.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepositoryReadme"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  "/v1/repositories/{owner}/{repository}/latest-commit":
    get:
      tags:
        - v1
      summary: Get Repository Latest Commit
      description: Retrieve the most recent commit for a repository ref and optional path. Public repositories can be retrieved without authentication.
      operationId: getRepositoryLatestCommit
      security:
        - { }
        - bearerAuth: [ ]
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repository
          in: path
          required: true
          schema:
            type: string
        - name: ref
          in: query
          required: false
          description: Branch, tag, or commit to read from. Defaults to the repository default branch.
          schema:
            type: string
        - name: path
          in: query
          required: false
          description: Repository path to constrain the latest commit lookup. Defaults to the repository root.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepositoryLatestCommit"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  "/v1/repositories/{owner}/{repository}/git-path/resolve":
    get:
      tags:
        - v1
      summary: Resolve Repository Git Path
      description: Resolve a GitHub-style path into a repository ref and optional path. Public repositories can be resolved without authentication.
      operationId: resolveRepositoryGitPath
      security:
        - { }
        - bearerAuth: [ ]
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repository
          in: path
          required: true
          schema:
            type: string
        - name: path
          in: query
          required: true
          description: Ambiguous path containing a ref followed by an optional repository path.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolvedRepositoryGitPath"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  "/v1/repositories/{owner}/{repository}/refs":
    get:
      tags:
        - v1
      summary: List Repository Refs
      description: List repository refs. Only branch refs are supported for now.
      operationId: listRepositoryRefs
      security:
        - { }
        - bearerAuth: [ ]
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repository
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: false
          description: Ref type to list. Currently only `branch` is supported.
          schema:
            $ref: "#/components/schemas/RepositoryRefType"
            default: branch
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRepositoryRefsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  "/v1/repositories/{owner}/{repository}/tree":
    get:
      tags:
        - v1
      summary: Get Repository Tree
      description: Retrieve the files and directories at a repository path. Public repositories can be retrieved without authentication.
      operationId: getRepositoryTree
      security:
        - { }
        - bearerAuth: [ ]
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repository
          in: path
          required: true
          schema:
            type: string
        - name: ref
          in: query
          required: false
          description: Branch, tag, or commit to read from. Defaults to the repository default branch.
          schema:
            type: string
        - name: path
          in: query
          required: false
          description: Directory path to list. Defaults to the repository root.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepositoryTree"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  schemas:
    Version:
      type: object
      required:
        - version
        - commit
      properties:
        version:
          type: string
          example: "0.0.1"
        commit:
          type: string
          example: d0beb8f5c55b36df7d674d55965a23b8d54ad69b
    CreateClerkSignInTokenResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
    CreateGitAccessTokenRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Local development laptop
        scopes:
          type: array
          items:
            type: string
          example:
            - repo:read
            - repo:write
        expiresAt:
          type: string
          format: date-time
          nullable: true
    CreateGitAccessTokenResponse:
      type: object
      required:
        - token
        - accessToken
      properties:
        token:
          type: string
          example: ctn_pat_example
        accessToken:
          $ref: "#/components/schemas/GitAccessToken"
    CreateRepositoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: catena
        description:
          type: string
          nullable: true
          example: A Git hosting platform.
        visibility:
          $ref: "#/components/schemas/RepositoryVisibility"
        defaultBranch:
          type: string
          description: Defaults to `main` when omitted.
          default: "main"
    CreateRepositoryResponse:
      allOf:
        - $ref: "#/components/schemas/Repository"
        - type: object
          required:
            - ownerName
          properties:
            ownerName:
              type: string
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
    GitAccessToken:
      type: object
      required:
        - id
        - name
        - tokenPrefix
        - scopes
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        tokenPrefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        revokedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Repository:
      type: object
      required:
        - id
        - ownerId
        - ownerName
        - name
        - visibility
        - defaultBranch
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        ownerId:
          type: string
          format: uuid
        ownerName:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        visibility:
          $ref: "#/components/schemas/RepositoryVisibility"
        defaultBranch:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RepositoryItem:
      type: object
      required:
        - id
        - repositoryId
        - number
        - reference
        - kind
        - title
        - authorId
        - createdAt
        - updatedAt
        - lastActivityAt
      properties:
        id:
          type: string
          format: uuid
        repositoryId:
          type: string
          format: uuid
        number:
          type: integer
          format: int64
        reference:
          type: string
          description: User-facing repository item reference, such as `CAT-1`.
        kind:
          $ref: "#/components/schemas/RepositoryItemKind"
        title:
          type: string
          minLength: 1
          pattern: '.*\S.*'
        body:
          type: string
          nullable: true
        authorId:
          type: string
          format: uuid
          nullable: true
          description: Null when the author account has been deleted.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time
    RepositoryItemKind:
      type: string
      enum:
        - issue
        - pull_request
    CreateIssueRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        body:
          type: string
          nullable: true
    ListIssuesResponse:
      type: object
      required:
        - issues
      properties:
        issues:
          type: array
          items:
            $ref: "#/components/schemas/Issue"
    Issue:
      allOf:
        - $ref: "#/components/schemas/RepositoryItem"
        - type: object
          required:
            - kind
            - status
          properties:
            kind:
              type: string
              enum:
                - issue
            status:
              $ref: "#/components/schemas/IssueStatus"
    IssueStatus:
      type: string
      enum:
        - open
        - in_progress
        - completed
        - cancelled
    PullRequestStatus:
      type: string
      enum:
        - open
        - merged
        - cancelled
    Label:
      type: object
      required:
        - id
        - repositoryId
        - name
        - color
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        repositoryId:
          type: string
          format: uuid
        name:
          type: string
          description: Labels are stored in lowercase.
          example: bug
        color:
          type: string
          description: Six-digit hexadecimal color prefixed with `#`.
          example: "#d73a4a"
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RepositoryItemTimelineEntry:
      type: object
      required:
        - id
        - repositoryItemId
        - actorId
        - payload
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        repositoryItemId:
          type: string
          format: uuid
        actorId:
          type: string
          format: uuid
          nullable: true
          description: Null when the actor account has been deleted.
        payload:
          $ref: "#/components/schemas/RepositoryItemTimelinePayload"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RepositoryItemTimelinePayload:
      oneOf:
        - $ref: "#/components/schemas/RepositoryItemCommentTimelinePayload"
        - $ref: "#/components/schemas/RepositoryItemTitleChangedTimelinePayload"
        - $ref: "#/components/schemas/RepositoryItemBodyChangedTimelinePayload"
        - $ref: "#/components/schemas/RepositoryItemLabelsChangedTimelinePayload"
        - $ref: "#/components/schemas/RepositoryItemIssueStatusChangedTimelinePayload"
        - $ref: "#/components/schemas/RepositoryItemPullRequestStatusChangedTimelinePayload"
      discriminator:
        propertyName: type
        mapping:
          comment: "#/components/schemas/RepositoryItemCommentTimelinePayload"
          title_changed: "#/components/schemas/RepositoryItemTitleChangedTimelinePayload"
          body_changed: "#/components/schemas/RepositoryItemBodyChangedTimelinePayload"
          labels_changed: "#/components/schemas/RepositoryItemLabelsChangedTimelinePayload"
          issue_status_changed: "#/components/schemas/RepositoryItemIssueStatusChangedTimelinePayload"
          pull_request_status_changed: "#/components/schemas/RepositoryItemPullRequestStatusChangedTimelinePayload"
    RepositoryItemCommentTimelinePayload:
      type: object
      required:
        - type
        - body
      properties:
        type:
          type: string
          enum:
            - comment
        body:
          type: string
    RepositoryItemTitleChangedTimelinePayload:
      type: object
      required:
        - type
        - previousTitle
        - newTitle
      properties:
        type:
          type: string
          enum:
            - title_changed
        previousTitle:
          type: string
        newTitle:
          type: string
    RepositoryItemBodyChangedTimelinePayload:
      type: object
      required:
        - type
        - diff
      properties:
        type:
          type: string
          enum:
            - body_changed
        diff:
          type: string
          description: Unified diff of the markdown source body.
    RepositoryItemLabelsChangedTimelinePayload:
      type: object
      required:
        - type
        - addedLabels
        - removedLabels
      properties:
        type:
          type: string
          enum:
            - labels_changed
        addedLabels:
          type: array
          items:
            $ref: "#/components/schemas/RepositoryItemTimelineLabelSnapshot"
        removedLabels:
          type: array
          items:
            $ref: "#/components/schemas/RepositoryItemTimelineLabelSnapshot"
    RepositoryItemTimelineLabelSnapshot:
      type: object
      required:
        - id
        - name
        - color
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Labels are stored in lowercase.
        color:
          type: string
    RepositoryItemIssueStatusChangedTimelinePayload:
      type: object
      required:
        - type
        - previousStatus
        - newStatus
      properties:
        type:
          type: string
          enum:
            - issue_status_changed
        previousStatus:
          $ref: "#/components/schemas/IssueStatus"
        newStatus:
          $ref: "#/components/schemas/IssueStatus"
    RepositoryItemPullRequestStatusChangedTimelinePayload:
      type: object
      required:
        - type
        - previousStatus
        - newStatus
      properties:
        type:
          type: string
          enum:
            - pull_request_status_changed
        previousStatus:
          $ref: "#/components/schemas/PullRequestStatus"
        newStatus:
          $ref: "#/components/schemas/PullRequestStatus"
    RepositoryVisibility:
      type: string
      enum:
        - private
        - public
      default: private
    ListRepositoryRefsResponse:
      type: object
      required:
        - refs
      properties:
        refs:
          type: array
          items:
            $ref: "#/components/schemas/RepositoryRef"
    RepositoryRef:
      type: object
      required:
        - name
        - type
        - commitOid
        - isDefault
      properties:
        name:
          type: string
        type:
          $ref: "#/components/schemas/RepositoryRefType"
        commitOid:
          type: string
        isDefault:
          type: boolean
    RepositoryRefType:
      type: string
      enum:
        - branch
    RepositoryReadme:
      type: object
      required:
        - ref
        - commitOid
        - path
        - name
        - oid
        - size
        - encoding
        - content
      properties:
        ref:
          type: string
        commitOid:
          type: string
        path:
          type: string
        name:
          type: string
        oid:
          type: string
        size:
          type: integer
          format: int64
        encoding:
          type: string
          example: utf-8
        content:
          type: string
    RepositoryLatestCommit:
      type: object
      required:
        - ref
        - commitOid
        - shortOid
        - messageHeadline
        - message
        - authorName
        - authorEmail
        - authoredAt
        - committerName
        - committerEmail
        - committedAt
      properties:
        ref:
          type: string
        commitOid:
          type: string
        shortOid:
          type: string
        messageHeadline:
          type: string
        message:
          type: string
        authorName:
          type: string
        authorEmail:
          type: string
        authoredAt:
          type: string
          format: date-time
        committerName:
          type: string
        committerEmail:
          type: string
        committedAt:
          type: string
          format: date-time
    ResolvedRepositoryGitPath:
      type: object
      required:
        - ref
        - commitOid
        - path
        - pathType
      properties:
        ref:
          type: string
        commitOid:
          type: string
        path:
          type: string
        pathType:
          type: string
          enum:
            - root
            - blob
            - tree
            - commit
    RepositoryTree:
      type: object
      required:
        - ref
        - commitOid
        - path
        - entries
      properties:
        ref:
          type: string
        commitOid:
          type: string
        path:
          type: string
        entries:
          type: array
          items:
            $ref: "#/components/schemas/RepositoryTreeEntry"
    RepositoryTreeEntry:
      type: object
      required:
        - name
        - path
        - type
        - oid
      properties:
        name:
          type: string
        path:
          type: string
        type:
          type: string
          enum:
            - blob
            - tree
            - commit
        oid:
          type: string
        size:
          type: integer
          format: int64
          nullable: true
    User:
      type: object
      required:
        - id
        - name
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UpdateAuthenticatedUserRequest:
      type: object
      properties:
        displayName:
          type: string
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      in: header
      name: Authorization

security:
  - bearerAuth: [ ]
